name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trade_terminal
          POSTGRES_USER: trade_user
          POSTGRES_PASSWORD: trade_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trade_user -d trade_terminal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://trade_user:trade_pass@localhost:5432/trade_terminal?schema=public
      JWT_SECRET: ci-secret
      FRONTEND_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix server
      - run: npm run db:migrate --prefix server
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run server:build
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
